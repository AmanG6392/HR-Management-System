# Render "Blueprint" — lets you deploy with one click via render.com/deploy
# (New + -> Blueprint -> point at this repo). Edit values as needed.
databases:
  - name: hrms-db
    plan: free
    databaseName: hrms
    user: hrms_user

services:
  - type: web
    name: hrms-backend
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && cd hrms && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn hrms.wsgi:application --chdir hrms --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-app.vercel.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://your-app.vercel.app"
      - key: DJANGO_TIME_ZONE
        value: "Asia/Kolkata"
